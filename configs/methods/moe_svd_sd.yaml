# MoE TopN-Expert SVD SD
# Track expert usage during target prefill, pick top-N most-used experts per
# MoE layer, SVD-compress them into the draft. Verification stays the same.
method: moe_svd_sd

llm_path: Qwen/Qwen3-30B-A3B-Instruct-2507

device: auto

recipe:
  class_path: specdecodes.helpers.recipes.factorize.moe_topn_svd:Recipe
  kwargs:
    topn_svd_config:
      top_n: 16
      rank: 1560
      svd_device: cuda:0
      # tracking_mode: how round-to-round expert counts are aggregated.
      #   tree     - count routing on every tree position (current default).
      #   verified - count only on accepted tokens, summed over a sliding
      #              window of `verified_window` accepted tokens.
      tracking_mode: tree
      # verified_window: if tracking_mode is `verified`, the window size for counting
      # verified_window: 16

max_length: 4096
cache_implementation:
  target: static
  draft: static

warmup_iter: 1
# Last-round-only updates swap the draft's `experts` ModuleList every round,
# which would invalidate a torch.compile trace. Keep target compiled (it is
# unmodified across rounds) and run the draft eagerly.
compile_mode:
  target: null
  draft: null

# Target sampling settings (defaults)
do_sample: false
temperature: 0

generator_profiling: true

generator_kwargs:
  prefill_chunk_size: 4096
  verify_method: exact
  verify_kwargs: {}

draft_params:
  temperature: 1.0
  max_depth: 5
  topk_len: 8
