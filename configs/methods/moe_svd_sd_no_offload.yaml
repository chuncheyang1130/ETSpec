# MoE TopN-Expert SVD SD (no offload).
#
# Track expert usage on the target across the whole generation, pick the
# top-N most-used experts per MoE layer, SVD-compress them into a packed
# draft block, and route via the target's full router with cluster-mass
# redirect from dropped experts onto the kept set.
method: moe_topn_svd_sd

llm_path: Qwen/Qwen3-30B-A3B-Instruct-2507

device: cuda:0

# Recipe takes no kwargs — fixed config lives in `_DEFAULTS` on the class.
# To tune `top_n` / `rank` / `svd_device` / expert-usage logging, edit the
# recipe (or subclass it).
recipe:
  class_path: specdecodes.helpers.recipes.factorize.moe_topn_svd_no_offload:Recipe

max_length: 512
cache_implementation:
  target: static
  draft: static

warmup_iter: 1
# `materialize_kept_from_target` swaps tensor *values* between rounds (never
# shapes), so the draft's compile graph stays valid. Target is unmodified
# round-to-round, so it can compile too — but the tracker hook re-runs the
# router in eager mode, which would interleave eager into a compiled target
# graph. Safer to keep the draft compiled and target eager.
compile_mode:
  target: null
  draft: max-autotune

# Target sampling settings (defaults).
do_sample: false
temperature: 0

generator_profiling: true

generator_kwargs:
  prefill_chunk_size: 512
  verify_method: exact
  verify_kwargs: {}

draft_params:
  temperature: 0.2
  max_depth: 6
  topk_len: 3
