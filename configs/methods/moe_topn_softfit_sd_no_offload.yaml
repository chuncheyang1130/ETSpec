# MoE TopN-SoftFit SD (no SVD, no offload).
#
# Builds on `moe_topn_sd_no_offload.yaml` but with three changes to the
# expert-selection / absorption machinery:
#
#   1. Mass-weighted tracker — picks top-N by accumulated softmax
#      routing mass instead of bincount, so a few high-confidence routes
#      outrank many low-confidence top-k scrapes.
#   2. Soft top-K weight-space redirect — dropped experts distribute
#      their mass across the top-K most-similar kept experts (cosine on
#      a cheap expert-weight footprint) instead of one-hot routing to
#      the single most-similar kept expert in router-row space.
#   3. Expert-weight-space similarity instead of router-row similarity
#      — captures "what does this expert compute" rather than just
#      "what triggers it".
#
# All build / generate / static-graph plumbing is identical to the no-SVD
# TopN base; only the picker source and the redirect-builder differ.
method: moe_topn_softfit_sd

llm_path: Qwen/Qwen3-30B-A3B-Instruct-2507

device: cuda:0

# Recipe takes no kwargs — fixed config (`top_n`, `redirect_topk`) lives
# inline in `generate_configurations`. To tune, edit the recipe (or
# subclass it).
recipe:
  class_path: specdecodes.helpers.recipes.moe.moe_topn_softfit_no_offload:Recipe

max_length: 2048
cache_implementation:
  target: static
  draft: static

warmup_iter: 1
# `materialize_kept_from_target` swaps tensor values between rounds
# (never shapes), so the draft's compile graph stays valid. The tracker
# hook reruns the target router in eager mode, so leave target uncompiled.
compile_mode:
  target: null
  draft: max-autotune

# Target sampling settings (defaults).
do_sample: false
temperature: 0

generator_profiling: true

generator_kwargs:
  prefill_chunk_size: 2048
  verify_method: exact
  verify_kwargs: {}

draft_params:
  temperature: 1.0
  max_depth: 16
  topk_len: 4
