# ExpSpec SD — top-N expert subset draft for Qwen3-MoE (bf16, no SVD, no offload).
#
# Behavior:
#   - Mass-weighted tracker: picks top-N kept experts per layer by
#     accumulated softmax routing mass, refreshed every round.
#   - Soft top-K weight-space redirect: dropped experts distribute their
#     mass across the top-K most-similar kept experts (cosine on a cheap
#     expert-weight footprint), not one-hot to a single nearest neighbor.
#   - Eager draft forward (use `expspec_sd_opt` for the CUDA-graph
#     captured variant + FP8 storage).
method: expspec_sd

llm_path: Qwen/Qwen3-30B-A3B-Instruct-2507

device: cuda:0
dtype: bfloat16

# Recipe takes no kwargs — fixed config (`top_n`, `redirect_topk`) lives
# inline in `generate_configurations`. To tune, edit the recipe (or
# subclass it).
recipe:
  class_path: specdecodes.helpers.recipes.moe.moe_topn_no_offload:Recipe

max_length: 2048
cache_implementation:
  target: static
  draft: static

warmup_iter: 1
# `materialize_kept_from_target` swaps tensor values between rounds
# (never shapes), so the draft's compile graph stays valid. The tracker
# hook reruns the target router in eager mode, so leave target uncompiled.
compile_mode:
  target: null
  draft: max-autotune

# Target sampling settings (defaults).
do_sample: false
temperature: 0

generator_profiling: true

generator_kwargs:
  prefill_chunk_size: 2048
  verify_method: exact
  verify_kwargs: {}

draft_params:
  temperature: 1.0
  max_depth: 16
  topk_len: 4
